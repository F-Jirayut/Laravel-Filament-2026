services:
  # PHP Application
  webapp:
    build:
      context: . 
      dockerfile: docker/webapp/Dockerfile
    container_name: filament-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - filament-network

  # Worker (ใช้ Dockerfile เดียวกับ app แต่รัน Supervisor)
  worker:
    build:
      context: .
      dockerfile: docker/webapp/Dockerfile
    container_name: filament-worker
    restart: unless-stopped
    # รัน Supervisor โดยอ้างอิงไฟล์คอนฟิกจาก volume
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    volumes:
      - ./:/var/www
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    networks:
      - filament-network

  # Nginx
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: filament-nginx
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www
    depends_on:
      - webapp
    networks:
      - filament-network

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: filament-db
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - filament-network

  # Redis
  redis:
    image: redis:alpine
    container_name: filament-redis
    networks:
      - filament-network

networks:
  filament-network:
    driver: bridge

volumes:
  pg-data: